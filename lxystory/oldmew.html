<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌠 流星雨故事会</title>
    <style>
        :root{
            --bg:#0c1445;
            --bg2:#1a237e;
            --card:rgba(255,255,255,0.08);
            --text:#f0f8ff;
            --text2:#b3e5fc;
            --btn:linear-gradient(45deg,#42a5f5,#7e57c2);
            --shadow:rgba(129,212,250,0.2);
        }
        [data-theme="light"]{
            --bg:#f5f7fa;
            --bg2:#e4e8f0;
            --card:rgba(0,0,0,0.05);
            --text:#222;
            --text2:#555;
            --btn:linear-gradient(45deg,#64b5f6,#7986cb);
            --shadow:rgba(0,0,0,0.1);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{
            min-height:100vh;
            background:linear-gradient(var(--bg),var(--bg2));
            color:var(--text);
            overflow-x:hidden;
            transition:background .5s ease,color .5s ease;
        }
        .star-bg{
            position:fixed;top:0;left:0;
            width:100%;height:100%;z-index:-1;
        }
        .shooting{
            position:absolute;
            background:linear-gradient(90deg,#fff,transparent);
            border-radius:99px;filter:blur(2px);
            animation:fall linear infinite;
        }
        @keyframes fall{
            0%{transform:translate(0,0) rotate(-30deg);opacity:1;}
            100%{transform:translate(-300px,500px) rotate(-30deg);opacity:0;}
        }
        header{
            display:flex;justify-content:space-between;align-items:center;
            padding:20px;max-width:950px;margin:0 auto;
        }
        h1{font-size:1.8rem;text-shadow:0 0 10px var(--text2);}
        #themeToggle{
            padding:8px 16px;border:none;border-radius:20px;
            background:var(--btn);color:#fff;cursor:pointer;
        }
        .container{max-width:950px;margin:0 auto;padding:20px;}
        .list-title{margin:10px 0 15px;font-size:1.2rem;}
        .story-list{
            display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
            gap:12px;margin-bottom:40px;
        }
        .story-item{
            background:var(--card);padding:14px;border-radius:12px;
            border:1px solid rgba(255,255,255,0.1);cursor:pointer;
            transition:transform .2s ease;
            text-align:center;
            position: relative;
        }
        .story-item:hover{transform:scale(1.03);}
        /* VIP 故事样式：金色边框 + VIP 标识 */
        .story-item.vip{
            border: 2px solid #ffd700 !important;
            box-shadow: 0 0 8px rgba(255,215,0,0.3);
        }
        .story-item.vip::after{
            content:"VIP";
            position:absolute;
            top:-8px;
            right:-8px;
            background:#ffd700;
            color:#0c1445;
            font-size:12px;
            font-weight:bold;
            padding:2px 8px;
            border-radius:8px;
            z-index: 10;
        }
        .player-modal{
            position:fixed;bottom:0;left:0;right:0;
            background:var(--bg2);padding:22px;border-radius:20px 20px 0 0;
            box-shadow:0 -5px 20px var(--shadow);
            transform:translateY(100%);transition:transform .4s ease;
            z-index:100;
        }
        .player-modal.show{transform:translateY(0);}
        .player-title{font-size:1.2rem;margin-bottom:15px;text-align:center;}
        .progress-wrap{margin:15px 0;}
        .progress-bar{
            width:100%;height:8px;border-radius:4px;
            background:rgba(255,255,255,0.2);position:relative;cursor:pointer;
        }
        .progress-fill{
            position:absolute;top:0;left:0;height:100%;
            background:#64b5f6;border-radius:4px;width:0%;
        }
        .time-info{display:flex;justify-content:space-between;font-size:.9rem;color:var(--text2);margin-top:8px;}
        .controls{display:flex;align-items:center;justify-content:center;gap:15px;flex-wrap:wrap;margin-top:10px;}
        .ctrl-btn{
            padding:10px 20px;border:none;border-radius:30px;
            background:var(--btn);color:#fff;cursor:pointer;
            font-size:0.95rem;
        }
        .speed-select{
            padding:8px;border-radius:8px;background:var(--card);color:var(--text);border:none;outline:none;
        }
        /* VIP 密码弹窗 */
        .vip-modal{
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            background:rgba(0,0,0,0.8);
            display:flex;align-items:center;justify-content:center;
            z-index:200;
            opacity:0;pointer-events:none;
            transition:all 0.3s ease;
        }
        .vip-modal.show{
            opacity:1;pointer-events:auto;
        }
        .vip-box{
            background:var(--bg2);
            padding:35px 30px;
            border-radius:16px;
            width:90%;max-width:420px;
            text-align:center;
            box-shadow:0 0 20px rgba(255,215,0,0.2);
        }
        .vip-title{
            font-size:1.3rem;color:#ffd700;margin-bottom:15px;
        }
        .vip-input{
            width:100%;padding:14px;
            border-radius:10px;border:none;
            background:var(--card);color:var(--text);
            font-size:1rem;margin:10px 0 20px;
        }
        .vip-btn{
            padding:10px 28px;margin:0 8px;
            border:none;border-radius:10px;
            background:var(--btn);color:#fff;
            cursor:pointer;font-size:1rem;
        }
        footer{text-align:center;padding:20px;color:var(--text2);font-size:.9rem;}
    </style>
</head>
<body>
    <div class="star-bg" id="starBox"></div>
    <header>
        <h1>🌠 流星雨故事会</h1>
        <button id="themeToggle">切换黑白模式</button>
    </header>
    <div class="container">
        <h2 class="list-title">故事列表 · 点击播放音频</h2>
        <div class="story-list" id="storyList"></div>
    </div>
    <audio id="audioPlayer"></audio>
    <!-- 播放器 -->
    <div class="player-modal" id="playerModal">
        <div class="player-title" id="playerTitle">暂无播放曲目</div>
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTime">00:00</span>
                <span id="totalTime">00:00</span>
            </div>
        </div>
        <div class="controls">
            <button class="ctrl-btn" id="playBtn">播放</button>
            <button class="ctrl-btn" id="pauseBtn">暂停</button>
            <button class="ctrl-btn" id="stopBtn">停止</button>
            <select class="speed-select" id="speedSelect">
                <option value="0.75">0.75倍</option>
                <option value="1" selected>1.0倍</option>
                <option value="1.25">1.25倍</option>
                <option value="1.5">1.5倍</option>
            </select>
        </div>
    </div>
    <!-- VIP 验证弹窗 -->
    <div class="vip-modal" id="vipModal">
        <div class="vip-box">
            <h3 class="vip-title">🔒 VIP 会员故事</h3>
            <p id="vipStoryName">请输入会员密码解锁</p>
            <input type="password" class="vip-input" id="vipPwd" placeholder="请输入会员密码">
            <div>
                <button class="vip-btn" id="btnUnlock">确认解锁</button>
                <button class="vip-btn" id="btnCancel">取消</button>
            </div>
        </div>
    </div>
    <footer>流星雨睡前故事 | 未完待续</footer>

    <script>
        // ==============================================
        // true = VIP（金边+标识+密码）
        // false = 普通（直接播放）
        // ==============================================
        const storyList = [
            { title: "喜欢下雨的小猫", audioSrc: "./audio/story1.mp3", isVip: true },
            { title: "月亮下的小狐狸", audioSrc: "./audio/story2.mp3", isVip: true },
            { title: "故事03", audioSrc: "audio/story03.mp3", isVip: false },
            { title: "故事04", audioSrc: "audio/story04.mp3", isVip: false },
            { title: "故事05", audioSrc: "audio/story05.mp3", isVip: false },
            { title: "故事06", audioSrc: "audio/story06.mp3", isVip: false },
            { title: "故事07", audioSrc: "audio/story07.mp3", isVip: false },
            { title: "故事08", audioSrc: "audio/story08.mp3", isVip: false },
            { title: "故事09", audioSrc: "audio/story09.mp3", isVip: false },
            { title: "故事10", audioSrc: "audio/story10.mp3", isVip: false },
            { title: "故事11", audioSrc: "audio/story11.mp3", isVip: false },
            { title: "故事12", audioSrc: "audio/story12.mp3", isVip: false },
            { title: "故事13", audioSrc: "audio/story13.mp3", isVip: false },
            { title: "故事14", audioSrc: "audio/story14.mp3", isVip: false },
            { title: "故事15", audioSrc: "audio/story15.mp3", isVip: false },
            { title: "故事16", audioSrc: "audio/story16.mp3", isVip: false },
            { title: "故事17", audioSrc: "audio/story17.mp3", isVip: false },
            { title: "故事18", audioSrc: "audio/story18.mp3", isVip: false },
            { title: "故事19", audioSrc: "audio/story19.mp3", isVip: false },
            { title: "故事20", audioSrc: "audio/story20.mp3", isVip: false },
            { title: "故事21", audioSrc: "audio/story21.mp3", isVip: false },
            { title: "故事22", audioSrc: "audio/story22.mp3", isVip: false },
            { title: "故事23", audioSrc: "audio/story23.mp3", isVip: false },
            { title: "故事24", audioSrc: "audio/story24.mp3", isVip: false },
            { title: "故事25", audioSrc: "audio/story25.mp3", isVip: false },
            { title: "故事26", audioSrc: "audio/story26.mp3", isVip: false },
            { title: "故事27", audioSrc: "audio/story27.mp3", isVip: false },
            { title: "故事28", audioSrc: "audio/story28.mp3", isVip: false },
            { title: "故事29", audioSrc: "audio/story29.mp3", isVip: false },
            { title: "故事30", audioSrc: "audio/story30.mp3", isVip: false },
            { title: "故事31", audioSrc: "audio/story31.mp3", isVip: false },
            { title: "故事32", audioSrc: "audio/story32.mp3", isVip: false },
            { title: "故事33", audioSrc: "audio/story33.mp3", isVip: false },
            { title: "故事34", audioSrc: "audio/story34.mp3", isVip: false },
            { title: "故事35", audioSrc: "audio/story35.mp3", isVip: false },
            { title: "故事36", audioSrc: "audio/story36.mp3", isVip: false },
            { title: "故事37", audioSrc: "audio/story37.mp3", isVip: false },
            { title: "故事38", audioSrc: "audio/story38.mp3", isVip: false },
            { title: "故事39", audioSrc: "audio/story39.mp3", isVip: false },
            { title: "故事40", audioSrc: "audio/story40.mp3", isVip: false },
            { title: "故事41", audioSrc: "audio/story41.mp3", isVip: false },
            { title: "故事42", audioSrc: "audio/story42.mp3", isVip: false },
            { title: "故事43", audioSrc: "audio/story43.mp3", isVip: false },
            { title: "故事44", audioSrc: "audio/story44.mp3", isVip: false },
            { title: "故事45", audioSrc: "audio/story45.mp3", isVip: false },
            { title: "故事46", audioSrc: "audio/story46.mp3", isVip: false },
            { title: "故事47", audioSrc: "audio/story47.mp3", isVip: false },
            { title: "故事48", audioSrc: "audio/story48.mp3", isVip: false },
            { title: "故事49", audioSrc: "audio/story49.mp3", isVip: false },
            { title: "故事50", audioSrc: "audio/story50.mp3", isVip: false }
        ];

        const VIP_PASSWORD = "我要入党之好高级呀"; 
        let currentStoryIndex = null;

        // 渲染故事列表
        const storyListEl = document.getElementById("storyList");
        storyList.forEach((story, idx) => {
            const item = document.createElement("div");
            item.className = "story-item";
            if (story.isVip) item.classList.add("vip");
            item.innerText = story.title;
            item.onclick = () => openStory(idx);
            storyListEl.appendChild(item);
        });

        // 播放器元素
        const audio = document.getElementById("audioPlayer");
        const playerModal = document.getElementById("playerModal");
        const playerTitle = document.getElementById("playerTitle");
        const progressFill = document.getElementById("progressFill");
        const currentTimeEl = document.getElementById("currentTime");
        const totalTimeEl = document.getElementById("totalTime");

        // VIP弹窗
        const vipModal = document.getElementById("vipModal");
        const vipStoryName = document.getElementById("vipStoryName");
        const vipPwdInput = document.getElementById("vipPwd");
        const btnUnlock = document.getElementById("btnUnlock");
        const btnCancel = document.getElementById("btnCancel");

        // 打开故事
        function openStory(idx) {
            const story = storyList[idx];
            currentStoryIndex = idx;
            if (!story.isVip) {
                playStory(idx);
                return;
            }
            // VIP：弹窗
            vipStoryName.innerText = `请输入密码解锁：${story.title}`;
            vipModal.classList.add("show");
            vipPwdInput.value = "";
            vipPwdInput.focus();
        }

        // 播放故事
        function playStory(idx) {
            const story = storyList[idx];
            playerTitle.innerText = story.title;
            playerModal.classList.add("show");
            audio.src = story.audioSrc;
            audio.play();
        }

        // 解锁VIP
        btnUnlock.onclick = () => {
            if (vipPwdInput.value === VIP_PASSWORD) {
                vipModal.classList.remove("show");
                playStory(currentStoryIndex);
            } else {
                alert("❌ 密码错误，请重试！");
                vipPwdInput.focus();
            }
        };

        // 取消
        btnCancel.onclick = () => {
            vipModal.classList.remove("show");
        };

        // 回车解锁
        vipPwdInput.onkeydown = (e) => {
            if (e.key === "Enter") btnUnlock.click();
        };

        // 播放器控制
        document.getElementById("playBtn").onclick = () => audio.play();
        document.getElementById("pauseBtn").onclick = () => audio.pause();
        document.getElementById("stopBtn").onclick = () => {
            audio.pause();
            audio.currentTime = 0;
        };
        document.getElementById("speedSelect").onchange = (e) => {
            audio.playbackRate = parseFloat(e.target.value);
        };

        // 进度条
        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + "%";
            currentTimeEl.innerText = fmtTime(audio.currentTime);
            totalTimeEl.innerText = fmtTime(audio.duration);
        };

        function fmtTime(s) {
            const m = Math.floor(s / 60).toString().padStart(2, "0");
            const sec = Math.floor(s % 60).toString().padStart(2, "0");
            return `${m}:${sec}`;
        }

        // 主题切换
        const themeToggle = document.getElementById("themeToggle");
        themeToggle.onclick = () => {
            document.documentElement.toggleAttribute("data-theme");
        };

        // 流星雨背景
        setInterval(() => {
            const star = document.createElement("div");
            star.className = "shooting";
            star.style.width = Math.random() * 70 + 30 + "px";
            star.style.top = Math.random() * 45 + "%";
            star.style.left = Math.random() * 100 + "%";
            const t = Math.random() * 3 + 2;
            star.style.animationDuration = t + "s";
            document.getElementById("starBox").appendChild(star);
            setTimeout(() => star.remove(), t * 1000);
        }, 350);
    </script>
</body>
</html>
