<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生物实验练习系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        :root {
            --main-color: #00d4ff;
            --dark-bg: #050c22;
            --card-bg: rgba(15, 30, 60, 0.7);
            --text-light: #c5e0ff;
        }

        body {
            min-height: 100vh;
            background-color: var(--dark-bg);
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .grid-line {
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(var(--main-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--main-color) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.08;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 60px 60px; }
        }

        .light-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,212,255,0.15), transparent 70%);
            animation: glowAnim 8s ease-in-out infinite alternate;
        }

        @keyframes glowAnim {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        .main-box {
            width: 100%;
            padding: 60px 20px;
        }

        .head-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .head-title h1 {
            font-size: clamp(24px, 5vw, 42px);
            color: #fff;
            letter-spacing: 3px;
            text-shadow: 0 0 15px var(--main-color);
            margin-bottom: 12px;
        }

        .head-title p {
            font-size: clamp(14px, 2vw, 18px);
            color: var(--text-light);
            opacity: 0.8;
        }

        .card-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            padding: 0 10px;
        }

        .science-card {
            position: relative;
            padding: 40px 25px;
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0,212,255,0.2);
            text-decoration: none;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .science-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
            transition: left 0.6s;
        }

        .science-card:hover::before {
            left: 100%;
        }

        .science-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--main-color);
            box-shadow: 0 10px 40px rgba(0,212,255,0.25);
        }

        .science-card:active {
            transform: scale(0.98);
        }

        .card-icon {
            font-size: 50px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 8px var(--main-color));
        }

        .card-name {
            font-size: clamp(18px, 3vw, 22px);
            color: #ffffff;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card-desc {
            font-size: 15px;
            color: var(--text-light);
            line-height: 1.8;
        }

        @media (max-width: 768px) {
            .main-box {
                padding: 40px 15px;
            }
            .card-container {
                gap: 20px;
            }
            .science-card {
                padding: 30px 20px;
            }
        }

        @media (max-width: 480px) {
            .card-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-layer">
        <div class="grid-line"></div>
        <div class="light-glow"></div>
    </div>

    <div class="main-box">
        <div class="head-title">
            <h1>生物实验练习平台</h1>
            <p>初中生物专项实验练习 · 知识点巩固</p>
        </div>

        <div class="card-container">
            <!-- 实验1：制作西瓜果肉细胞临时装片 -->
            <a href="./no1.html" target="_blank" class="science-card">
                <div class="card-icon">🔬</div>
                <h3 class="card-name">西瓜果肉细胞临时装片制作</h3>
                <p class="card-desc">学习临时装片制作步骤，使用显微镜观察西瓜果肉细胞基本结构</p>
            </a>

            <!-- 实验2：观察种子的结构 -->
            <a href="./no2.html" target="_blank" class="science-card">
                <div class="card-icon">🌰</div>
                <h3 class="card-name">观察种子的结构</h3>
                <p class="card-desc">解剖菜豆种子与玉米种子，区分双子叶和单子叶种子内部组成结构</p>
            </a>

            <!-- 实验3：探究酶溶液对淀粉的消化作用 -->
            <a href="./no3.html" target="_blank" class="science-card">
                <div class="card-icon">🧪</div>
                <h3 class="card-name">探究酶对淀粉的消化作用</h3>
                <p class="card-desc">设置对照实验，探究唾液淀粉酶等酶溶液对淀粉的消化分解效果</p>
            </a>
        </div>
    </div>
</body>
</html>
